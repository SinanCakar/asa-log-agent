[agent]
# Bot ingest endpoint (HTTPS). Kendi bot adresinle doldur. Boş token = dry-run.
api_url = https://ingest.machinebot.tr/ingest/logs
token =
# Hangi sunucuda oynanıyor (rapor etiketi).
server_label =
# Yakalama aralığı (saniye).
interval = 10
# Tribe-log paneli ekran dikdörtgeni: x,y,genişlik,yükseklik. calibrate.py doldurur.
region =
# OCR hata toleransı (0-1, düşük = daha toleranslı). 0.72 sentetik testte iyi.
fuzzy_threshold = 0.72
# Tesseract yolu (Windows'ta örn. C:\Program Files\Tesseract-OCR\tesseract.exe).
# Boş = PATH'ten bulunur.
tesseract_path =
# Bağlantı koparsa olayların biriktiği yerel kuyruk.
queue_file = offline_queue.jsonl
# Tekrar-bastırma penceresi (son N olay hatırlanır).
dedup_window = 200
