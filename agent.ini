[agent]
# Bot ingest endpoint (HTTPS). Set this to your bot's URL. Empty token = dry-run.
api_url = https://ingest.machinebot.tr/ingest/logs
token =
# Which server you play on (report label).
server_label =
# Capture interval (seconds).
interval = 10
# Tribe-log panel screen rectangle: x,y,width,height. Filled by the calibrator.
region =
# OCR error tolerance (0-1, lower = more tolerant). 0.72 works well in tests.
fuzzy_threshold = 0.72
# Tesseract path (Windows, e.g. C:\Program Files\Tesseract-OCR\tesseract.exe).
# Empty = found on PATH.
tesseract_path =
# Local queue where events pile up if the connection drops.
queue_file = offline_queue.jsonl
# Dedup window (how many recent events are remembered).
dedup_window = 200
